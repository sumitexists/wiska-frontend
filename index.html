<!doctype html>
<html lang="en" class="!text-[16px]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024" />
    <title>Wiska | Two Sides. One You.</title>
    <script>
  (function() {
    function resetZoom() {
      // Detect the current scaling factor (e.g., 1.25 for 125%)
      const devicePixelRatio = window.devicePixelRatio || 1;
      
      if (devicePixelRatio !== 1) {
        // Calculate the inverse scale required to hit 100%
        const inverseScale = 1 / devicePixelRatio;
        
        // Apply the fix to the HTML document root
        document.documentElement.style.zoom = inverseScale;
      }
    }
    
    // Execute immediately and listen for window resizing
    resetZoom();
    window.addEventListener('resize', resetZoom);
  })();
</script>

  </head>
  <body style="background-color: black; color: white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
